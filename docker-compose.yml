services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: auto_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env.example
    depends_on:
      - db
      - redis
      - minio
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/runtime:/app/runtime
  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env.example
    depends_on:
      - backend
      - redis
      - minio
      - db
    volumes:
      - ./backend/app:/app/app
      - ./backend/runtime:/app/runtime
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 80
      UPSTREAM_API_HOSTPORT: backend:8000
    ports:
      - "3000:80"
volumes:
  postgres_data:
  minio_data:
