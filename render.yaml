databases:
  - name: auto-analytics-db
    plan: basic-256mb
    postgresMajorVersion: "16"
    databaseName: auto_analytics
    user: auto_analytics
    ipAllowList: []
services:
  - type: keyvalue
    name: auto-analytics-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
  - type: web
    name: auto-analytics-backend
    runtime: docker
    plan: starter
    rootDir: backend
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/v1/healthz
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: TASK_BACKEND
        value: celery
      - key: STORAGE_BACKEND
        value: s3
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: auto-analytics-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: auto-analytics-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: auto-analytics-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: auto-analytics-redis
          type: keyvalue
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT_URL
        value: ""
      - key: S3_USE_SSL
        value: "true"
  - type: worker
    name: auto-analytics-worker
    runtime: docker
    plan: starter
    rootDir: backend
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A app.core.celery_app.celery_app worker --loglevel=info
    envVars:
      - key: ENVIRONMENT
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: ENVIRONMENT
      - key: TASK_BACKEND
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: TASK_BACKEND
      - key: STORAGE_BACKEND
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: STORAGE_BACKEND
      - key: SECRET_KEY
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: DATABASE_URL
      - key: REDIS_URL
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: REDIS_URL
      - key: CELERY_BROKER_URL
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: CELERY_BROKER_URL
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: CELERY_RESULT_BACKEND
      - key: OPENAI_API_KEY
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: OPENAI_API_KEY
      - key: OPENAI_MODEL
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: OPENAI_MODEL
      - key: AWS_ACCESS_KEY_ID
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: AWS_ACCESS_KEY_ID
      - key: AWS_SECRET_ACCESS_KEY
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: AWS_SECRET_ACCESS_KEY
      - key: AWS_REGION
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: AWS_REGION
      - key: S3_BUCKET
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: S3_BUCKET
      - key: S3_ENDPOINT_URL
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: S3_ENDPOINT_URL
      - key: S3_USE_SSL
        fromService:
          name: auto-analytics-backend
          type: web
          envVarKey: S3_USE_SSL
  - type: web
    name: auto-analytics-frontend
    runtime: docker
    plan: starter
    rootDir: frontend
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    healthCheckPath: /
    envVars:
      - key: UPSTREAM_API_HOSTPORT
        fromService:
          name: auto-analytics-backend
          type: web
          property: hostport
